<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="Send OTP page for the Cars Dealership website."
    />
    <meta name="keywords" content="cars, dealership, OTP, username, password" />
    <title>Send OTP Page</title>
    <style>
      @import url("Style/Style.css");
    </style>
  </head>
  <body class="background-sendotp">
    <div class="sendOTP-box">
      <h2 class="sendOTP-title">Send OTP</h2>

      <!-- Email Input -->
      <div>
        <input class="input-email" placeholder="Email" required type="email" />
        <div class="line" id="Eline"></div>
      </div>

      <!-- Username Input -->
      <div>
        <input
          class="input-username"
          placeholder="Username"
          type="text"
          required
        />
        <div class="line" id="Uline"></div>
      </div>

      <!-- Action Message -->
      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>

      <!-- Send Button -->
      <div>
        <button class="sendOTP-btn" onclick="Check()">Send Reset Link</button>
      </div>

      <!-- Links -->
      <div class="signup-section">
        <a class="signup-link" href="Signup.html"
          >Don't Have An Account? SignUp!
        </a>
        <div class="remember-section">
          <a class="remember-link" href="Login.html">Remember Password?</a>
        </div>
      </div>
    </div>
    <script src="Script/Script.js"></script>
  </body>
</html>
