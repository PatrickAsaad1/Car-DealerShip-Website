<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="Change Password page for the Cars Dealership website."
    />
    <meta
      name="keywords"
      content="cars, dealership, login, username, password"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>Change Password Page</title>
    <style>
      @import url("Style/SendOTP.css");
    </style>
  </head>
  <body class="background">
    <div class="sendOTP-box">
      <h2 class="sendOTP-title">Change Password</h2>

      <div>
        <input class="input-email" placeholder="Email" required type="email" />
        <div class="line" id="Eline"></div>
      </div>

      <!-- Username -->
      <div>
        <input
          class="input-username"
          placeholder="Username"
          type="text"
          required
        />
        <div class="line" id="Uline"></div>
      </div>
      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>
      <div>
        <button class="sendOTP-btn" onclick="Check()">Send Reset Link</button>
      </div>
      <div class="signup-section">
        <a class="signup-link" href="/Signup.html"
          >Don't Have An Account? SignUp!
        </a>
        <div class="remember-section">
          <a class="remember-link" href="/Login.html">Remember Password?</a>
        </div>
      </div>
    </div>
    <script src="Script/SendOTP_Validator.js"></script>
  </body>
</html>
