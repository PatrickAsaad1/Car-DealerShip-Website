<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="Change Password page for the Cars Dealership website."
    />
    <meta
      name="keywords"
      content="cars, dealership, login, username, password"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>Change Password Page</title>
    <style>
      @import url("../Style/Style.css");
    </style>
  </head>
  <body class="background-changepass">
    <div class="ChangePass-box">
      <h2 class="ChangePass-title">Change Password</h2>

      <!-- New Password with Eye -->
      <div class="password-wrapper">
        <input
          class="input-password"
          id="newPassword"
          placeholder="New Password"
          type="password"
          minlength="8"
          required
        />
        <span class="eyebox" id="toggleEye1">
          <i class="fas fa-eye" id="eyeIcon1"></i>
        </span>
      </div>
      <div class="line" id="Pline1"></div>

      <!-- Confirm Password with Eye -->
      <div class="password-wrapper">
        <input
          class="input-password"
          id="confirmPassword"
          placeholder="Confirm Password"
          type="password"
          minlength="8"
          required
        />
        <span class="eyebox" id="toggleEye2">
          <i class="fas fa-eye" id="eyeIcon2"></i>
        </span>
      </div>
      <div class="line" id="Pline2"></div>

      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>
      <div>
        <button class="changepass-btn" onclick="Check()">
          Change Password
        </button>
      </div>
      <div class="signup-section">
        <a class="signup-link" href="Signup.html"
          >Don't Have An Account? SignUp!
        </a>
        <div class="remember-section">
          <a class="remember-link" href="Login.html">Remember Password?</a>
        </div>
      </div>
    </div>
    <script src="Script/Script.js"></script>
  </body>
</html>
