<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- CSS (Templates → Style folder) -->

      <div class="car-card">

      <!-- MERCEDES -->

        <img src="../Assets/auto3.png" alt="Mercedes AMG GT">

      <div class="car-card">
        <img src="../Assets/cybertruck.png" alt="Tesla Cybertruck">
