<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="Login page for the Cars Dealership website."
    />
    <meta
      name="keywords"
      content="cars, dealership, login, username, password"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>Login Page</title>
    <link rel="stylesheet" href="../Style/Style.css" />
  </head>
  <body class="background-login">
    <div class="login-box">
      <h2 class="login-title">Login</h2>

      <!-- Username -->
      <div>
        <input class="input-username" placeholder="Username" required />
        <div class="line" id="Uline"></div>
      </div>

      <!-- Password with Eye -->
      <div class="password-wrapper">
        <input
          class="input-password"
          id="passwordInput"
          placeholder="Password"
          type="password"
          minlength="8"
          required
        />
        <span class="eyebox" id="toggleEye">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </span>
      </div>
      <div class="line" id="Pline"></div>

      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>
      <div>
        <button class="login-btn" onclick="Check()">Log In</button>
      </div>
      <div class="register-section">
        <a class="register-link" href="Signup.html">
          Don't Have Account? Register!
        </a>
        <div class="forgot-section">
          <a class="forgot-link" href="SendOTP.html">Forgot Password?</a>
        </div>
      </div>
    </div>
    <script src="../Script/Script.js"></script>
  </body>
</html>
