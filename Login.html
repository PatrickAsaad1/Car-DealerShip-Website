<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="Login page for the Cars Dealership website."
    />
    <meta
      name="keywords"
      content="cars, dealership, login, username, password"
    />
    <title>Login Page</title>
  </head>
  <body class="background">
    <div class="login-box">
      <h2 class="login-title">Login</h2>
      <div>
        <input class="input-username" placeholder="Username" required />
        <div class="line" id="Uline"></div>
      </div>
      <div>
        <input
          class="input-password"
          placeholder="Password"
          type="password"
          required
        />
        <div class="line" id="Pline"></div>
      </div>
      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>
      <div>
        <button class="login-btn" onclick="Check()">Log In</button>
      </div>
      <div class="register-section">
        <a class="register-link" href="#"> Don't Have Account? Register! </a>
        <div class="forgot-section">
          <a class="forgot-link" href="#">Forgot Password?</a>
        </div>
      </div>
    </div>
  </body>
</html>
