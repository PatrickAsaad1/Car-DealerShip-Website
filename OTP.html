<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="OTP Verifivation page for the Cars Dealership website."
    />
    <meta name="keywords" content="cars, dealership, OTP, username, password" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>OTP Verification Page</title>
    <style>
      @import url("Style/OTP.css");
    </style>
  </head>
  <body class="background">
    <div class="OTP-box">
      <h2 class="OTP-title">Forgot Password</h2>
      <div>
        <input class="input-OTP" placeholder="Enter OTP Code" required />
        <div class="line" id="Oline"></div>
      </div>
      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>
      <div>
        <button class="OTP-btn" onclick="Check()">Check OTP</button>
      </div>
      <div class="signup-section">
        <a class="signup-link" href="/Signup.html"
          >Don't Have An Account? SignUp!
        </a>
        <div class="remember-section">
          <a class="remember-link" href="/Login.html">Remember Password?</a>
        </div>
      </div>
    </div>
    <script src="Script/OTP.js"></script>
  </body>
</html>
