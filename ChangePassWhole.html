<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Patrick" />
    <meta
      name="description"
      content="Change Password page for the Cars Dealership website."
    />
    <meta
      name="keywords"
      content="cars, dealership, login, username, password"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>Change Password Page</title>
    <style>
      /* Body Styling */
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* Background Style */
      .background {
        background-image: url("/Assets/ChangePass.jpeg");
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        width: 100%;
      }

      /* SignUp Form Style */
      .changepass-box {
        background-color: rgba(0, 0, 0, 0.85);
        width: 380px;
        padding: 30px 40px;
        border-radius: 15px;
      }

      .input-email {
        background: transparent;
        width: 100%;
        height: 50px;
        font-weight: bold;
        font-size: 19px;
        color: white;
        transition: 0.6s;
        border: none;
      }

      /* Username Input Styling */
      .input-username {
        background: transparent;
        width: 100%;
        height: 50px;
        font-weight: bold;
        font-size: 19px;
        color: white;
        transition: 0.6s;
        border: none;
        margin-top: 20px;
      }

      /* The SignUp Thingy At The Top's Style */
      .changepass-title {
        font-style: italic;
        font-weight: bold;
        color: white;
        text-align: center;
        margin-top: 10px;
        font-size: 40px;
      }

      /* Buttons Style */
      .changepass-btn {
        padding: 10px;
        border-radius: 40px;
        display: block;
        margin: 30px auto 0;
        width: 100%;
        max-width: 300px;
        height: 45px;
        font-weight: 700;
        border: none;
        outline: none;
        font-size: 16px;
        cursor: pointer;
      }

      /* Buttons On Hover Style */
      .changepass-btn:hover {
        background-color: #c4c4c4;
        transition: 0.4s;
      }

      /* UnderLine Each Input */
      .line {
        height: 2px;
        background-color: #666;
        transition: background-color 0.5s ease;
      }

      .signup-section {
        margin-top: 20px;
        text-align: center;
      }

      .signup-link {
        font-weight: bold;
        font-style: italic;
        color: white;
        text-decoration: none;
      }

      .signup-link:hover {
        text-decoration: underline;
      }

      .remember-link:hover {
        text-decoration: underline;
      }

      .remember-link {
        font-weight: bold;
        font-style: italic;
        color: white;
        text-decoration: none;
      }

      .remember-section {
        margin-top: 10px;
      }
      .action {
        color: white;
        font-style: italic;
        font-family: Arial, sans-serif;
      }

      /* Mobile Responsive */
      @media (max-width: 480px) {
        .changepass-box {
          width: 90%;
          padding: 20px 25px;
          margin: 20px;
        }

        .changepass-title {
          font-size: 30px;
        }

        .changepass-btn {
          max-width: 100%;
        }

        .changepass-password {
          padding-right: 40px;
        }
      }
    </style>
  </head>
  <body class="background">
    <div class="changepass-box">
      <h2 class="changepass-title">Change Password</h2>

      <div>
        <input class="input-email" placeholder="Email" required type="email" />
        <div class="line" id="Eline"></div>
      </div>

      <!-- Username -->
      <div>
        <input
          class="input-username"
          placeholder="Username"
          type="text"
          required
        />
        <div class="line" id="Uline"></div>
      </div>
      <div>
        <p class="action" id="action">Awaiting Action...</p>
      </div>
      <div>
        <button class="changepass-btn" onclick="Check()">
          Send Reset Link
        </button>
      </div>
      <div class="signup-section">
        <a class="signup-link" href="/Signup.html"
          >Don't Have An Account? SignUp!
        </a>
        <div class="remember-section">
          <a class="remember-link" href="/Login.html">Remember Password?</a>
        </div>
      </div>
    </div>
    <script>
      function Check() {
        let UsernameInput = document.querySelector(".input-username");
        let Username = UsernameInput.value.trim();
        let EmailInput = document.querySelector(".input-email");
        let Email = EmailInput.value.trim();

        // Reset lines to gray at the start of every check
        document.getElementById("Uline").style.backgroundColor = "#666";
        document.getElementById("Eline").style.backgroundColor = "#666";
        if (Email === "" && Username === "") {
          console.log("ERROR: No Email or Username Entered");
          document.getElementById("action").innerHTML =
            "Please Enter Your Email and Username";
          document.getElementById("Eline").style.backgroundColor = "red";
          document.getElementById("Uline").style.backgroundColor = "red";
          return;
        }

        if (Email === "") {
          console.log("ERROR: No Email Entered");
          document.getElementById("action").innerHTML =
            "Please Enter Your Email";
          document.getElementById("Eline").style.backgroundColor = "red";
          return;
        }

        if (Username === "") {
          console.log("ERROR: Empty Username Input");
          document.getElementById("action").innerHTML =
            "Please Enter Your Username";
          document.getElementById("Uline").style.backgroundColor = "red";
          return;
        }

        if (!Email.includes("@") || !Email.includes(".")) {
          console.log("ERROR: Invalid Email Format");
          document.getElementById("action").innerHTML =
            "Please Enter A Valid Email Address";
          document.getElementById("Eline").style.backgroundColor = "red";
          return;
        }

        if (Username.length >= 32) {
          console.log("ERROR: Username Too Long");
          document.getElementById("action").innerHTML =
            "Username Must Be Less Than 32 Characters Long";
          document.getElementById("Uline").style.backgroundColor = "red";
          return;
        }

        if (Username.length < 3) {
          console.log("ERROR: Username Too Short");
          document.getElementById("action").innerHTML =
            "Username Must Be At Least 3 Characters Long";
          document.getElementById("Uline").style.backgroundColor = "red";
          return;
        }

        console.log("Code Sent Successfully");
        document.getElementById("action").innerHTML = "Code Sent Successfully!";
        document.getElementById("Uline").style.backgroundColor = "green";
        document.getElementById("Eline").style.backgroundColor = "green";

        // Wait 2 seconds, then redirect
        setTimeout(function () {
          window.location.href = "OTP.html";
        }, 2000);
      }
    </script>
  </body>
</html>
